<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ineligible - Nester Loan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            color: white;
            font-size: 26px;
            font-weight: 700;
        }

        .header p {
            color: #a0aec0;
            font-size: 13px;
            margin-top: 6px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        h2 {
            color: #c53030;
            font-size: 22px;
            margin-bottom: 12px;
        }

        .message {
            background: #fff5f5;
            border: 2px solid #fc8181;
            border-radius: 12px;
            padding: 16px;
            color: #742a2a;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .info {
            color: #4a5568;
            font-size: 13px;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .back-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            margin-bottom: 12px;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: translateY(-2px);
        }

        .back {
            margin-top: 16px;
        }

        .back a {
            color: #a0aec0;
            font-size: 13px;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🏦 Nester Loan</h1>
            <p>Application Result</p>
        </div>

        <div class="card">
            <div class="icon">😔</div>
            <h2>Sorry {{ first_name }},</h2>

            <div class="message">
                {{ reason }}
            </div>

            <p class="info">
                We appreciate your interest in Nester Loan.
                If you believe this is a mistake or need
                more information, please visit us in person
                at Afrancho.
            </p>

            <a href="/" class="back-btn">← Try Again</a>

            <div class="back">
                <a href="/status">🔍 Check Existing Application</a>
            </div>
        </div>
    </div>
</body>

</html>
